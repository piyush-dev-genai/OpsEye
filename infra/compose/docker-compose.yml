services:
  kafka:
    image: apache/kafka:3.9.2
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      SERVICE_NAME: api
      API_HOST: 0.0.0.0
      KAFKA_BROKERS: kafka:9092
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('node:http');const port=process.env.API_PORT||'3000';const request=http.get({host:'127.0.0.1',port,path:'/health'},(response)=>{process.exit(response.statusCode===200?0:1);});request.on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  ingestion-worker:
    build:
      context: ../../
      dockerfile: infra/docker/ingestion-worker.Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      SERVICE_NAME: ingestion-worker
      KAFKA_BROKERS: kafka:9092
      VECTOR_STORE_URL: redis://redis:6379

  query-worker:
    build:
      context: ../../
      dockerfile: infra/docker/query-worker.Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      SERVICE_NAME: query-worker
      KAFKA_BROKERS: kafka:9092
      VECTOR_STORE_URL: redis://redis:6379

volumes:
  kafka-data:
  redis-data:
